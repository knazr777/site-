<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dane Garmin</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* NAV */
    .topnav {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      border-bottom: 1px solid #2d3348;
      background: #0f1117;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topnav a {
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      color: #94a3b8;
      padding: 6px 12px;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
    }
    .topnav a:hover, .topnav a.active { background: #1e2330; color: #f1f5f9; }
    .spacer { flex: 1; }
    .refresh-btn {
      background: none;
      border: 1px solid #2d3348;
      color: #94a3b8;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .refresh-btn:hover { background: #1e2330; color: #f1f5f9; }
    .refresh-btn.loading { opacity: 0.5; pointer-events: none; }
    .refresh-btn.loading .spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* LAYOUT */
    .page { max-width: 520px; margin: 0 auto; padding: 20px 16px 0; }
    .meta { font-size: 0.75rem; color: #475569; margin-bottom: 16px; }
    .section-title {
      font-size: 0.72rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #64748b; margin-bottom: 12px;
    }
    .card { background: #1e2330; border: 1px solid #2d3348; border-radius: 14px; padding: 20px; margin-bottom: 16px; }

    /* TABS + KARUZELA */
    .carousel-wrap { margin-bottom: 16px; }
    .tabs {
      display: flex; gap: 4px; margin-bottom: 10px;
    }
    .tab {
      flex: 1; text-align: center;
      padding: 7px 4px;
      font-size: 0.78rem; font-weight: 500;
      color: #64748b;
      background: #161b27;
      border: 1px solid #2d3348;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      user-select: none;
    }
    .tab.active { background: #1e2330; color: #f1f5f9; border-color: #60a5fa; }
    .carousel {
      display: flex; overflow-x: scroll;
      scroll-snap-type: x mandatory;
      gap: 12px; scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .carousel::-webkit-scrollbar { display: none; }
    .carousel-slide {
      scroll-snap-align: start;
      flex: 0 0 100%;
      background: #1e2330;
      border: 1px solid #2d3348;
      border-radius: 14px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* SLIDE 1 — STATUS */
    .status-top { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
    .status-emoji { font-size: 2.8rem; line-height: 1; }
    .status-label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
    .status-value { font-size: 1.15rem; font-weight: 700; }
    .status-comment { font-size: 0.83rem; color: #94a3b8; line-height: 1.55; margin-bottom: 16px; }
    .pills { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pill { background: #161b27; border-radius: 10px; padding: 10px 12px; }
    .pill .p-label { font-size: 0.68rem; color: #64748b; margin-bottom: 2px; }
    .pill .p-value { font-size: 1rem; font-weight: 600; }
    .c-green { color: #4ade80; } .c-yellow { color: #facc15; } .c-red { color: #f87171; } .c-dim { color: #475569; }

    /* SLIDE 2 — 7 DNI */
    .week-row {
      display: flex; align-items: center;
      padding: 9px 0;
      border-top: 1px solid #2d3348;
      gap: 10px;
    }
    .week-row:first-child { border-top: none; }
    .week-date { font-size: 0.75rem; color: #64748b; width: 52px; flex-shrink: 0; line-height: 1.2; }
    .week-icon { font-size: 1.2rem; width: 26px; text-align: center; flex-shrink: 0; }
    .week-info { flex: 1; min-width: 0; }
    .week-info .wi-name { font-size: 0.82rem; color: #f1f5f9; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .week-info .wi-sub { font-size: 0.72rem; color: #64748b; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .week-badge {
      flex-shrink: 0;
      font-size: 0.68rem; font-weight: 600;
      padding: 3px 7px; border-radius: 6px;
      letter-spacing: 0.03em;
    }

    /* SLIDE 3 — TABELA ZDROWIA */
    .health-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .health-table th {
      text-align: left; font-size: 0.68rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: #64748b; padding: 0 6px 8px 0;
    }
    .health-table td { padding: 7px 6px 7px 0; border-top: 1px solid #2d3348; color: #cbd5e1; }
    .health-table tr:first-child td { border-top: none; }
    .g, td.g, .p-value.g { color: #4ade80 !important; }
    .y, td.y, .p-value.y { color: #facc15 !important; }
    .o, td.o, .p-value.o { color: #fb923c !important; }
    .r, td.r, .p-value.r { color: #f87171 !important; }
    .d, td.d, .p-value.d { color: #475569 !important; }

    /* TRENINGI */
    .trening-item { border-top: 1px solid #2d3348; padding: 12px 0; }
    .trening-item:first-child { border-top: none; padding-top: 0; }
    .trening-header { display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
    .tr-icon { font-size: 1.3rem; width: 28px; text-align: center; }
    .tr-main { flex: 1; }
    .tr-main .typ { font-weight: 600; font-size: 0.88rem; color: #f1f5f9; }
    .tr-main .sub { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
    .tr-date { font-size: 0.75rem; color: #64748b; }
    .arrow { font-size: 0.8rem; color: #475569; transition: transform 0.2s; }
    .trening-item.open .arrow { transform: rotate(180deg); }
    .tr-details {
      display: none; margin-top: 12px;
      padding: 12px; background: #161b27; border-radius: 10px;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .trening-item.open .tr-details { display: grid; }
    .d-item .d-label { font-size: 0.67rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .d-item .d-value { font-size: 0.88rem; color: #e2e8f0; font-weight: 500; margin-top: 2px; }

    /* WYKRESY */
    .chart-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
    .chart-tab {
      flex: 1; text-align: center; padding: 6px 4px;
      font-size: 0.75rem; font-weight: 500; color: #64748b;
      background: #161b27; border: 1px solid #2d3348; border-radius: 8px;
      cursor: pointer; transition: all 0.15s; user-select: none;
    }
    .chart-tab.active { background: #1e2330; color: #f1f5f9; border-color: #60a5fa; }
    .chart-panel { display: none; }
    .chart-panel.active { display: block; }
    .chart-wrap { position: relative; height: 200px; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e2330; border: 1px solid #2d3348;
      border-radius: 10px; padding: 10px 18px;
      font-size: 0.82rem; color: #94a3b8;
      transition: transform 0.3s; z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .loading { color: #64748b; text-align: center; padding: 48px; }
  </style>
</head>
<body>

<nav class="topnav">
  <a href="/">🏠 Hub</a>
  <a href="/dane.html" class="active">📊 Dane</a>
  <a href="/coach.html">🤖 Coach</a>
  <a href="https://n8n.nzr-hub.uk" target="_blank" rel="noopener">⚙️ n8n</a>
  <div class="spacer"></div>
  <button class="refresh-btn" id="refreshBtn" onclick="triggerRefresh()">
    <span class="spin">↻</span> Odśwież
  </button>
</nav>

<div class="page" id="page">
  <div class="loading">Ładowanie danych…</div>
</div>

<div class="toast" id="toast"></div>

<script>
const API     = 'https://n8n.nzr-hub.uk/webhook/dane';
const REFRESH = 'https://n8n.nzr-hub.uk/webhook/refresh';

// ── PROGI (dopasowane do danych użytkownika) ──────────────────────────
const T = {
  hrv:  { green: 82, yellow: 72 },
  rhr:  { green: 51, yellow: 54 },
  sen:  { green: 7,  yellow: 6  },
  bb:   { green: 80, yellow: 60 },
};

// ── SŁOWNIKI ─────────────────────────────────────────────────────────
const ICONS = { running:'🏃', strength_training:'💪', yoga:'🧘', cycling:'🚴', swimming:'🏊' };
const TYPY  = { running:'Bieganie', strength_training:'Siłownia', yoga:'Joga', cycling:'Rower', swimming:'Pływanie' };
function icon(t) { return ICONS[t] || '🏋️'; }
function typ(t)  { return TYPY[t]  || t; }

const MONTHS = ['sty','lut','mar','kwi','maj','cze','lip','sie','wrz','paź','lis','gru'];
function fmtDate(str) {
  const d = new Date(str);
  return d.getDate() + ' ' + MONTHS[d.getMonth()];
}

// ── KOLORY (4-stopniowe) ─────────────────────────────────────────────
const COL = { green:'#4ade80', yellow:'#facc15', orange:'#fb923c', red:'#f87171', dim:'#475569' };

function cHRV(v) {
  if(!v) return 'dim';
  if(v>=82) return 'green'; if(v>=72) return 'yellow'; if(v>=62) return 'orange'; return 'red';
}
function cRHR(v) {
  if(!v) return 'dim';
  if(v<=51) return 'green'; if(v<=54) return 'yellow'; if(v<=57) return 'orange'; return 'red';
}
function cSen(v) {
  if(!v) return 'dim';
  if(v>=7) return 'green'; if(v>=6) return 'yellow'; if(v>=5) return 'orange'; return 'red';
}
function cBB(v) {
  if(!v) return 'dim';
  if(v>=80) return 'green'; if(v>=60) return 'yellow'; if(v>=40) return 'orange'; return 'red';
}

// ── SCORE (0–2 per metryka) ───────────────────────────────────────────
function s(col) { return col==='green'?2:col==='yellow'?1.5:col==='orange'?0.7:col==='red'?0:null; }

// ── KONDYCJA COMPOSITE (0–100) ────────────────────────────────────────
// HRV*0.4 + RHR_inv*0.3 + BB*0.3 — każde znormalizowane do zakresu użytkownika
function kondycjaScore(hrv, rhr, bb) {
  const hMin=60, hMax=100;
  const rMin=45, rMax=65;
  const bMin=0,  bMax=100;
  const hN = hrv!=null ? Math.max(0, Math.min(100, (hrv-hMin)/(hMax-hMin)*100)) : null;
  const rN = rhr!=null ? Math.max(0, Math.min(100, (rMax-rhr)/(rMax-rMin)*100)) : null;
  const bN = bb !=null ? Math.max(0, Math.min(100, (bb-bMin)/(bMax-bMin)*100))  : null;
  const vals=[]; const ws=[];
  if(hN!=null){vals.push(hN*0.4); ws.push(0.4);}
  if(rN!=null){vals.push(rN*0.3); ws.push(0.3);}
  if(bN!=null){vals.push(bN*0.3); ws.push(0.3);}
  if(!vals.length) return null;
  const wSum=ws.reduce((a,b)=>a+b,0);
  return Math.round(vals.reduce((a,b)=>a+b,0)/wSum*100)/100;
}

// ── STATUS REGENERACJI ────────────────────────────────────────────────
// Używa bb_min ostatniego dnia + czas od ostatniego treningu
function calcStatus(zdrowie, treningi) {
  const sorted = [...zdrowie].sort((a,b)=>b.data.localeCompare(a.data));
  // Szukaj najnowszego dnia z danymi
  const latest = sorted[0];
  // Użyj bb_min jako aktualnego stanu (po całym dniu / po treningu)
  // bb_last = ostatnia znana wartość z dnia (po treningu / wieczorem) — aktualny stan
  // fallback na bb_max jeśli bb_last niedostępne (starsze wpisy)
  const bb = latest.bb_last != null ? latest.bb_last : latest.bb_max;

  // Czas od ostatniego treningu w godzinach
  const lastT = treningi.sort((a,b)=>b.data.localeCompare(a.data))[0];
  let hoursRest = null;
  if(lastT) {
    const msPerH = 3600000;
    hoursRest = Math.round((Date.now() - new Date(lastT.data).getTime()) / msPerH);
  }

  const scores = [s(cHRV(latest.hrv)), s(cRHR(latest.rhr)), s(cSen(latest.sen_godz)), s(cBB(bb))].filter(x=>x!==null);
  const rawScore = scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : 0;
  // Bonus/malus za czas odpoczynku
  let restBonus = 0;
  if(hoursRest!==null) {
    if(hoursRest >= 48) restBonus = 0.15;
    else if(hoursRest >= 24) restBonus = 0;
    else restBonus = -0.2;
  }
  const finalScore = Math.max(0, Math.min(1, rawScore/2 + restBonus));

  let emoji, label, color;
  if(finalScore >= 0.8)      { emoji='🟢'; label='Gotowy na ciężki wysiłek'; color='#4ade80'; }
  else if(finalScore >= 0.55){ emoji='🟡'; label='Umiarkowana gotowość';      color='#facc15'; }
  else if(finalScore >= 0.35){ emoji='🟠'; label='Oszczędzaj energię';        color='#fb923c'; }
  else                       { emoji='🔴'; label='Regeneracja priorytetem';   color='#f87171'; }

  return { emoji, label, color, latest, bb, hoursRest, rawScore: finalScore };
}

function statusComment(st) {
  const { latest, bb, hoursRest } = st;
  const parts = [];
  if(latest.hrv && latest.hrv < T.hrv.yellow) parts.push(`HRV ${latest.hrv} — poniżej normy`);
  if(latest.rhr && latest.rhr > T.rhr.yellow) parts.push(`RHR podwyższone (${latest.rhr} bpm)`);
  if(latest.sen_godz && latest.sen_godz < T.sen.yellow) parts.push(`Krótki sen (${latest.sen_godz.toFixed(1)}h)`);
  if(bb && bb < T.bb.yellow) parts.push(`Niskie Body Battery (${bb})`);
  if(hoursRest !== null && hoursRest < 20) parts.push(`Ostatni trening ${hoursRest}h temu — krótki odpoczynek`);
  if(parts.length === 0) {
    return st.rawScore >= 0.8
      ? 'Wszystkie wskaźniki w normie. Dobry moment na mocniejszy trening.'
      : 'Parametry w porządku — trenuj zgodnie z planem.';
  }
  return parts.join('. ') + '.';
}

// ── INTENSYWNOŚĆ TRENINGU ─────────────────────────────────────────────
function trainingIntensity(t) {
  if(!t) return null;
  const z3z4 = (t.z3_pct||0) + (t.z4_pct||0);
  const z2   = t.z2_pct||0;
  if(t.typ==='strength_training') return { label:'Siła',    bg:'rgba(167,139,250,0.2)', col:'#a78bfa' };
  if(t.typ==='yoga')              return { label:'Regen',   bg:'rgba(52,211,153,0.2)',  col:'#34d399' };
  if(t.typ==='cycling')           return { label:'Rower',   bg:'rgba(96,165,250,0.2)',  col:'#60a5fa' };
  if(t.typ==='swimming')          return { label:'Basen',   bg:'rgba(96,165,250,0.2)',  col:'#60a5fa' };
  if(z3z4 >= 25)                  return { label:'Wysoka',  bg:'rgba(248,113,113,0.2)', col:'#f87171' };
  if(z3z4 >= 10)                  return { label:'Średnia', bg:'rgba(250,204,21,0.2)',  col:'#facc15' };
  if(z2 >= 50)                    return { label:'Z2',      bg:'rgba(74,222,128,0.2)',  col:'#4ade80' };
  return                                  { label:'Niska',   bg:'rgba(96,165,250,0.15)', col:'#60a5fa' };
}

// ── HELPERS ───────────────────────────────────────────────────────────
function fmt(v, suf='', dec=0) {
  if(v===null||v===undefined) return '<span class="d">—</span>';
  return (dec?(+v).toFixed(dec):v)+suf;
}
function clx(col) { return col==='green'?'g':col==='yellow'?'y':col==='orange'?'o':col==='red'?'r':'d'; }

// ── KARUZELA ─────────────────────────────────────────────────────────
function initCarousel(id, tabsId) {
  const carousel = document.getElementById(id);
  const tabs = document.querySelectorAll(`#${tabsId} .tab`);
  if(!carousel) return;
  carousel.addEventListener('scroll', ()=>{
    const idx = Math.round(carousel.scrollLeft / carousel.offsetWidth);
    tabs.forEach((t,i)=>t.classList.toggle('active', i===idx));
  }, { passive:true });
  tabs.forEach((t,i)=>t.addEventListener('click',()=>{
    carousel.scrollTo({ left: i*carousel.offsetWidth, behavior:'smooth' });
  }));
}

// ── RENDER GŁÓWNY ─────────────────────────────────────────────────────
function renderPage(data) {
  const zdrowie  = [...data.zdrowie].sort((a,b)=>b.data.localeCompare(a.data));
  const treningi = [...data.treningi].sort((a,b)=>b.data.localeCompare(a.data));

  const st    = calcStatus(zdrowie, treningi);
  const last7 = getLast7Days(zdrowie, treningi);

  document.getElementById('page').innerHTML = `
    <p class="meta">Ostatnia aktualizacja: ${data.ostatnia_aktualizacja}</p>

    <!-- KARUZELA GŁÓWNA -->
    <div class="carousel-wrap">
      <div class="tabs" id="tabs1">
        <div class="tab active">Status</div>
        <div class="tab">7 dni</div>
        <div class="tab">Zdrowie</div>
      </div>
      <div class="carousel" id="car1">

        <!-- SLIDE 1: STATUS -->
        <div class="carousel-slide">
          <div class="section-title">Gotowość dziś</div>
          <div class="status-top">
            <div class="status-emoji">${st.emoji}</div>
            <div>
              <div class="status-label">Regeneracja</div>
              <div class="status-value" style="color:${st.color}">${st.label}</div>
            </div>
          </div>
          <p class="status-comment">${statusComment(st)}</p>
          <div class="pills">
            <div class="pill">
              <div class="p-label">HRV</div>
              <div class="p-value ${clx(cHRV(st.latest.hrv))}">${st.latest.hrv??'—'}</div>
            </div>
            <div class="pill">
              <div class="p-label">RHR</div>
              <div class="p-value ${clx(cRHR(st.latest.rhr))}">${st.latest.rhr??'—'} bpm</div>
            </div>
            <div class="pill">
              <div class="p-label">Sen</div>
              <div class="p-value ${clx(cSen(st.latest.sen_godz))}">${st.latest.sen_godz?st.latest.sen_godz.toFixed(1)+'h':'—'}</div>
            </div>
            <div class="pill">
              <div class="p-label">Body Battery</div>
              <div class="p-value ${clx(cBB(st.bb))}">${st.bb??'—'}</div>
            </div>
          </div>
        </div>

        <!-- SLIDE 2: 7 DNI -->
        <div class="carousel-slide">
          <div class="section-title">Ostatnie 7 dni</div>
          ${last7.map(day => {
            const t = day.training;
            const intens = trainingIntensity(t);
            const sub = t ? [
              t.dystans_km ? t.dystans_km+'km' : null,
              t.czas_min   ? Math.round(t.czas_min)+'min' : null,
              t.tempo      ? t.tempo+'/km' : null,
            ].filter(Boolean).join(' · ') : '';
            return `
            <div class="week-row">
              <div class="week-date">${fmtDate(day.date)}</div>
              <div class="week-icon">${t ? icon(t.typ) : '😴'}</div>
              <div class="week-info">
                <div class="wi-name">${t ? typ(t.typ) : 'Regeneracja'}</div>
                ${sub ? `<div class="wi-sub">${sub}</div>` : ''}
              </div>
              ${intens ? `<div class="week-badge" style="background:${intens.bg};color:${intens.col}">${intens.label}</div>` : ''}
            </div>`;
          }).join('')}
        </div>

        <!-- SLIDE 3: TABELA ZDROWIA -->
        <div class="carousel-slide">
          <div class="section-title">Dane zdrowotne</div>
          <table class="health-table">
            <thead><tr>
              <th>Data</th><th>HRV</th><th>RHR</th><th>BB</th><th>Sen</th><th>Jakość</th>
            </tr></thead>
            <tbody>
              ${zdrowie.map(r=>`<tr>
                <td>${fmtDate(r.data)}</td>
                <td class="${clx(cHRV(r.hrv))}">${r.hrv??'—'}</td>
                <td class="${clx(cRHR(r.rhr))}">${r.rhr??'—'}</td>
                <td class="${clx(cBB(r.bb_max))}">${r.bb_max??'—'}</td>
                <td class="${clx(cSen(r.sen_godz))}">${r.sen_godz?r.sen_godz.toFixed(1)+'h':'—'}</td>
                <td class="${clx(cBB(r.jakosc_snu))}">${r.jakosc_snu??'—'}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- TRENINGI -->
    <div class="card">
      <div class="section-title">Treningi</div>
      ${treningi.map((t,i)=>{
        const summary = [
          t.dystans_km ? t.dystans_km+'km' : null,
          t.czas_min   ? Math.round(t.czas_min)+'min' : null,
          t.tempo      ? t.tempo+'/km' : null,
        ].filter(Boolean).join(' · ');
        const details = [
          t.hr_avg    ? ['HR avg', t.hr_avg+' bpm'] : null,
          t.hr_max    ? ['HR max', t.hr_max+' bpm'] : null,
          t.z2_pct    ? ['Strefa 2', t.z2_pct+'%'] : null,
          t.z3_pct    ? ['Strefa 3', t.z3_pct+'%'] : null,
          t.tempo     ? ['Tempo', t.tempo+'/km'] : null,
          t.vo2max    ? ['VO2max', t.vo2max] : null,
          t.body_battery_delta && t.body_battery_delta!=='UNKNOWN' ? ['BB efekt', t.body_battery_delta] : null,
        ].filter(Boolean);
        return `
        <div class="trening-item" id="tr-${i}">
          <div class="trening-header" onclick="toggleT(${i})">
            <div class="tr-icon">${icon(t.typ)}</div>
            <div class="tr-main">
              <div class="typ">${typ(t.typ)}</div>
              <div class="sub">${summary||'—'}</div>
            </div>
            <div class="tr-date">${t.data.slice(5)}</div>
            <div class="arrow">▾</div>
          </div>
          <div class="tr-details">
            ${details.map(([l,v])=>`<div class="d-item"><div class="d-label">${l}</div><div class="d-value">${v}</div></div>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- WYKRESY -->
    <div class="card">
      <div class="section-title">Wykresy</div>
      <div class="chart-tabs">
        <div class="chart-tab active" onclick="switchChart(0)">Kondycja</div>
        <div class="chart-tab" onclick="switchChart(1)">Progres</div>
      </div>
      <div class="chart-panel active" id="cp0">
        <div class="chart-wrap"><canvas id="chartKondycja"></canvas></div>
      </div>
      <div class="chart-panel" id="cp1">
        <div class="chart-wrap"><canvas id="chartProgres"></canvas></div>
      </div>
    </div>
  `;

  initCarousel('car1','tabs1');
  renderChartKondycja(zdrowie);
  renderChartProgres(treningi);
}

// ── 7 DNI — mapowanie dat na treningi ────────────────────────────────
function getLast7Days(zdrowie, treningi) {
  const days = [];
  const trainingMap = {};
  treningi.forEach(t => { trainingMap[t.data] = t; });
  const sorted = [...zdrowie].sort((a,b)=>b.data.localeCompare(a.data)).slice(0,7);
  sorted.forEach(z => {
    days.push({ date: z.data, health: z, training: trainingMap[z.data] || null });
  });
  return days;
}

// ── TOGGLE TRENINGI ───────────────────────────────────────────────────
function toggleT(i) { document.getElementById('tr-'+i).classList.toggle('open'); }

// ── CHART SWITCH ──────────────────────────────────────────────────────
let activeChart = 0;
function switchChart(idx) {
  document.querySelectorAll('.chart-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.chart-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  activeChart = idx;
}

// ── CHART 1: KONDYCJA ─────────────────────────────────────────────────
function renderChartKondycja(zdrowie) {
  const sorted = [...zdrowie].sort((a,b)=>a.data.localeCompare(b.data));
  const labels  = sorted.map(r=>fmtDate(r.data));
  const scores  = sorted.map(r=>kondycjaScore(r.hrv, r.rhr, r.bb_max));
  const colors  = scores.map(v=>{
    if(v===null) return COL.dim;
    if(v>=70) return COL.green;
    if(v>=45) return COL.yellow;
    if(v>=25) return '#fb923c';
    return COL.red;
  });

  // Skala: min - 10 poniżej najniższego, max + 5 powyżej najwyższego
  const valid = scores.filter(v=>v!==null);
  const yMin = valid.length ? Math.max(0,  Math.floor(Math.min(...valid)) - 10) : 0;
  const yMax = valid.length ? Math.min(100, Math.ceil(Math.max(...valid))  + 5)  : 100;

  Chart.register(ChartDataLabels);

  new Chart(document.getElementById('chartKondycja'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Kondycja',
        data: scores,
        backgroundColor: colors,
        borderRadius: 5,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true,
          labels: {
            generateLabels: () => [
              { text:'Świetna (≥70)', fillStyle:'#4ade80', strokeStyle:'#4ade80', lineWidth:0 },
              { text:'Dobra (45–69)', fillStyle:'#facc15', strokeStyle:'#facc15', lineWidth:0 },
              { text:'Słaba (25–44)', fillStyle:'#fb923c', strokeStyle:'#fb923c', lineWidth:0 },
              { text:'Zła (<25)',     fillStyle:'#f87171', strokeStyle:'#f87171', lineWidth:0 },
            ],
            color: '#cbd5e1', font:{ size:10 }, boxWidth:10, padding:8,
          }
        },
        datalabels: {
          anchor: 'end', align: 'end',
          color: '#94a3b8',
          font: { size: 9, weight: '600' },
          formatter: v => v !== null ? Math.round(v) : '',
          offset: -2,
        }
      },
      scales: {
        x: { ticks:{ color:'#64748b', font:{size:10} }, grid:{ color:'#2d3348' } },
        y: { min: yMin, max: yMax, ticks:{ color:'#64748b', font:{size:10} }, grid:{ color:'#2d3348' } }
      }
    }
  });
}

// ── CHART 2: PROGRES ──────────────────────────────────────────────────
function renderChartProgres(treningi) {
  // Tylko biegi z danymi
  const runs = treningi
    .filter(t=>t.typ==='running' && t.czas_min)
    .sort((a,b)=>a.data.localeCompare(b.data));

  const labels   = runs.map(r=>fmtDate(r.data));
  const volumen  = runs.map(r=>Math.round(r.czas_min));
  // Filtruj nieprawidłowe wartości VO2max (>100 = moc w watach, nie VO2max)
  const vo2      = runs.map(r=>(r.vo2max && r.vo2max <= 100) ? r.vo2max : null);
  const hasVo2   = vo2.some(v=>v!==null);

  const datasets = [{
    type: 'bar',
    label: 'Czas biegu (min)',
    data: volumen,
    backgroundColor: 'rgba(96,165,250,0.4)',
    borderRadius: 5,
    yAxisID: 'y',
  }];

  if(hasVo2) {
    datasets.push({
      type: 'line',
      label: 'VO2max',
      data: vo2,
      borderColor: '#4ade80',
      backgroundColor: 'rgba(74,222,128,0.1)',
      pointBackgroundColor: '#4ade80',
      tension: 0.3,
      spanGaps: true,
      pointRadius: 4,
      yAxisID: 'vo2',
    });
  }

  new Chart(document.getElementById('chartProgres'), {
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: { legend:{ labels:{ color:'#94a3b8', font:{size:10} } } },
      scales: {
        x:   { ticks:{ color:'#64748b', font:{size:10} }, grid:{ color:'#2d3348' } },
        y:   { ticks:{ color:'#64748b', font:{size:10} }, grid:{ color:'#2d3348' },
               title:{ display:true, text:'min', color:'#60a5fa', font:{size:10} } },
        vo2: { position:'right', ticks:{ color:'#64748b', font:{size:10} },
               grid:{ drawOnChartArea:false },
               title:{ display:true, text:'VO2max', color:'#4ade80', font:{size:10} } }
      }
    }
  });
}

// ── TOAST ─────────────────────────────────────────────────────────────
function showToast(msg, ms=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}

// ── REFRESH ───────────────────────────────────────────────────────────
async function triggerRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  try {
    await fetch(REFRESH, { method:'GET', mode:'cors' });
    showToast('⏳ Skrypt odpalony — dane odświeżą się za ~1 min');
  } catch(e) {
    showToast('❌ Błąd połączenia z n8n');
  }
  setTimeout(()=>btn.classList.remove('loading'), 3000);
}

// ── LOAD ──────────────────────────────────────────────────────────────
async function load() {
  try {
    const res = await fetch(API);
    if(!res.ok) throw new Error();
    renderPage(await res.json());
  } catch(e) {
    document.getElementById('page').innerHTML = '<div class="loading">Błąd ładowania danych</div>';
  }
}

load();
</script>
