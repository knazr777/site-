<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dane Garmin</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 4px;
    }

    .meta {
      font-size: 0.8rem;
      color: #64748b;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 12px;
    }

    .card {
      background: #1e2330;
      border: 1px solid #2d3348;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    th {
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #64748b;
      padding: 0 8px 10px 8px;
    }

    td {
      padding: 8px;
      border-top: 1px solid #2d3348;
      color: #cbd5e1;
    }

    tr:first-child td { border-top: none; }

    td.good { color: #4ade80; }
    td.warn { color: #facc15; }
    td.bad  { color: #f87171; }
    td.dim  { color: #475569; }

    .chart-wrap {
      position: relative;
      height: 200px;
    }

    .treningi-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .trening-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: #161b27;
      border-radius: 8px;
      font-size: 0.85rem;
    }

    .trening-icon {
      font-size: 1.2rem;
      width: 28px;
      text-align: center;
    }

    .trening-info { flex: 1; }
    .trening-info .typ { font-weight: 600; color: #f1f5f9; font-size: 0.82rem; }
    .trening-info .sub { color: #64748b; font-size: 0.75rem; margin-top: 2px; }

    .trening-stats {
      text-align: right;
      font-size: 0.78rem;
      color: #94a3b8;
    }

    .loading { color: #64748b; text-align: center; padding: 40px; }
    .error { color: #f87171; text-align: center; padding: 40px; font-size: 0.9rem; }

    @media (max-width: 480px) {
      th:nth-child(n+5), td:nth-child(n+5) { display: none; }
    }
  </style>
</head>
<body>

<h1>Dane Garmin</h1>
<div class="meta" id="meta">Ładowanie...</div>

<div class="card">
  <div class="section-title">Zdrowie — ostatnie dni</div>
  <div id="zdrowie-wrap"><div class="loading">Ładowanie...</div></div>
</div>

<div class="card">
  <div class="section-title">HRV & RHR (ms / uderzenia/min)</div>
  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>
</div>

<div class="card">
  <div class="section-title">Ostatnie treningi</div>
  <div id="treningi-wrap"><div class="loading">Ładowanie...</div></div>
</div>

<script>
const API = 'https://n8n.nzr-hub.uk/webhook/dane';

const ICONS = {
  running: '🏃',
  strength_training: '💪',
  yoga: '🧘',
  cycling: '🚴',
  swimming: '🏊',
};

function icon(typ) {
  return ICONS[typ] || '🏋️';
}

function hrv_class(v) {
  if (v === null) return 'dim';
  if (v >= 75) return 'good';
  if (v >= 55) return '';
  return 'bad';
}

function bb_class(v) {
  if (v === null) return 'dim';
  if (v >= 70) return 'good';
  if (v >= 40) return 'warn';
  return 'bad';
}

function sen_class(v) {
  if (v === null) return 'dim';
  if (v >= 7) return 'good';
  if (v >= 6) return 'warn';
  return 'bad';
}

function fmt(v, suffix = '', decimals = 0) {
  if (v === null || v === undefined) return '<span style="color:#475569">—</span>';
  return (decimals ? v.toFixed(decimals) : v) + suffix;
}

function renderZdrowie(rows) {
  const sorted = [...rows].sort((a, b) => b.data.localeCompare(a.data)).slice(0, 7);
  const html = `
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>HRV</th>
          <th>RHR</th>
          <th>BB max</th>
          <th>Sen h</th>
          <th>Jakość</th>
          <th>Kroki</th>
        </tr>
      </thead>
      <tbody>
        ${sorted.map(r => `
          <tr>
            <td>${r.data.slice(5)}</td>
            <td class="${hrv_class(r.hrv)}">${fmt(r.hrv)}</td>
            <td>${fmt(r.rhr)}</td>
            <td class="${bb_class(r.bb_max)}">${fmt(r.bb_max)}</td>
            <td class="${sen_class(r.sen_godz)}">${fmt(r.sen_godz, 'h', 1)}</td>
            <td>${fmt(r.jakosc_snu)}</td>
            <td>${r.kroki ? r.kroki.toLocaleString('pl') : '<span style="color:#475569">—</span>'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
  document.getElementById('zdrowie-wrap').innerHTML = html;
}

function renderChart(rows) {
  const sorted = [...rows].sort((a, b) => a.data.localeCompare(b.data));
  const labels = sorted.map(r => r.data.slice(5));
  const hrv = sorted.map(r => r.hrv);
  const rhr = sorted.map(r => r.rhr);

  new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'HRV',
          data: hrv,
          borderColor: '#4ade80',
          backgroundColor: 'rgba(74,222,128,0.08)',
          tension: 0.3,
          spanGaps: true,
          pointRadius: 4,
        },
        {
          label: 'RHR',
          data: rhr,
          borderColor: '#60a5fa',
          backgroundColor: 'rgba(96,165,250,0.08)',
          tension: 0.3,
          spanGaps: true,
          pointRadius: 4,
          yAxisID: 'rhr',
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#2d3348' } },
        y: {
          ticks: { color: '#64748b', font: { size: 10 } },
          grid: { color: '#2d3348' },
          title: { display: true, text: 'HRV', color: '#4ade80', font: { size: 10 } }
        },
        rhr: {
          position: 'right',
          ticks: { color: '#64748b', font: { size: 10 } },
          grid: { drawOnChartArea: false },
          title: { display: true, text: 'RHR', color: '#60a5fa', font: { size: 10 } }
        }
      }
    }
  });
}

function typLabel(typ) {
  const map = {
    running: 'Bieganie',
    strength_training: 'Siłownia',
    yoga: 'Joga',
    cycling: 'Rower',
    swimming: 'Pływanie',
  };
  return map[typ] || typ;
}

function renderTreningi(rows) {
  const sorted = [...rows].sort((a, b) => b.data.localeCompare(a.data));
  const html = `<div class="treningi-list">${sorted.map(t => {
    const details = [
      t.dystans_km ? `${t.dystans_km} km` : null,
      t.czas_min ? `${Math.round(t.czas_min)} min` : null,
      t.tempo ? `tempo ${t.tempo}/km` : null,
      t.hr_avg ? `HR avg ${t.hr_avg}` : null,
      t.z2_pct ? `Z2 ${t.z2_pct}%` : null,
    ].filter(Boolean).join(' · ');
    return `
      <div class="trening-row">
        <div class="trening-icon">${icon(t.typ)}</div>
        <div class="trening-info">
          <div class="typ">${typLabel(t.typ)}</div>
          <div class="sub">${details}</div>
        </div>
        <div class="trening-stats">${t.data.slice(5)}</div>
      </div>`;
  }).join('')}</div>`;
  document.getElementById('treningi-wrap').innerHTML = html;
}

async function load() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    document.getElementById('meta').textContent = `Ostatnia aktualizacja: ${data.ostatnia_aktualizacja}`;
    renderZdrowie(data.zdrowie);
    renderChart(data.zdrowie);
    renderTreningi(data.treningi);
  } catch (e) {
    document.getElementById('meta').textContent = '';
    ['zdrowie-wrap', 'treningi-wrap'].forEach(id => {
      document.getElementById(id).innerHTML = `<div class="error">Błąd ładowania danych</div>`;
    });
    console.error(e);
  }
}

load();
</script>
</body>
</html>
