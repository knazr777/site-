<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NZR Hub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
    }
    .bg-cover {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 520px;
      background: url('HOME.png') center/cover no-repeat;
      opacity: 0.28;
      z-index: 0;
      pointer-events: none;
    }
    .topnav, h1, .subtitle, .nav { position: relative; z-index: 1; }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #64748b;
      margin-bottom: 48px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 340px;
    }

    a.btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: #1e2330;
      border: 1px solid #2d3348;
      border-radius: 12px;
      text-decoration: none;
      color: #e2e8f0;
      transition: background 0.15s, border-color 0.15s;
    }

    a.btn:hover {
      background: #252b3b;
      border-color: #3d4562;
    }

    .btn-icon {
      font-size: 1.4rem;
      width: 32px;
      text-align: center;
    }

    .btn-text { flex: 1; }
    .btn-text .title { font-weight: 600; font-size: 0.95rem; color: #f1f5f9; }
    .btn-text .desc { font-size: 0.75rem; color: #64748b; margin-top: 2px; }

    .btn-arrow { color: #475569; font-size: 0.9rem; }

    a.btn.external .btn-arrow::after { content: '↗'; }
    a.btn:not(.external) .btn-arrow::after { content: '→'; }

    .topnav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      border-bottom: 1px solid #2d3348;
      background: #0f1117;
    }

    .topnav a {
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      color: #94a3b8;
      padding: 6px 12px;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
    }

    .topnav a:hover { background: #1e2330; color: #f1f5f9; }
    .topnav a.active { background: #1e2330; color: #f1f5f9; }
  </style>
</head>
<body>
  <div class="bg-cover"></div>
  <div class="bg-cover-fade"></div>

  <nav class="topnav">
    <a href="/" class="active">🏠 Hub</a>
    <a href="/dane.html">📊 Dane</a>
    <a href="/coach.html">🤖 Coach</a>
    <a href="/cel.html">🎯 Cel</a>
    <a href="https://n8n.nzr-hub.uk" target="_blank" rel="noopener">⚙️ n8n</a>
  </nav>

  <h1>NZR Hub</h1>
  <p class="subtitle">Garmin · Trening · Zdrowie</p>

  <nav class="nav">
    <a class="btn" href="/dane.html">
      <span class="btn-icon">📊</span>
      <span class="btn-text">
        <span class="title">Dane</span>
        <span class="desc">HRV, sen, Body Battery, treningi</span>
      </span>
      <span class="btn-arrow"></span>
    </a>

    <a class="btn" href="/coach.html">
      <span class="btn-icon">🤖</span>
      <span class="btn-text">
        <span class="title">Coach</span>
        <span class="desc">Rekomendacja treningowa na dziś</span>
      </span>
      <span class="btn-arrow"></span>
    </a>

    <a class="btn" href="/cel.html">
      <span class="btn-icon">🎯</span>
      <span class="btn-text">
        <span class="title">Cel</span>
        <span class="desc">Architekt Wartości — Warszawa 2027</span>
      </span>
      <span class="btn-arrow"></span>
    </a>

    <a class="btn external" href="https://n8n.nzr-hub.uk" target="_blank" rel="noopener">
      <span class="btn-icon">⚙️</span>
      <span class="btn-text">
        <span class="title">n8n</span>
        <span class="desc">Panel automatyzacji</span>
      </span>
      <span class="btn-arrow"></span>
    </a>
  </nav>

</body>
</html>
